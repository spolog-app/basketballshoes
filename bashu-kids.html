function starsHTML(rating,reviews){
  var full=Math.floor(rating);
  var half=rating-full>=0.3?1:0;
  var s="";
  for(var i=0;i<full;i++)s+="★";
  if(half)s+="☆";
  for(var i=full+half;i<5;i++)s+="☆";
  return'<div class="bsh-rc-stars"><span class="stars">'+s+'</span><span class="score">'+rating.toFixed(1)+'</span><span class="count">('+reviews.toLocaleString()+'件のレビュー)</span></div>';
}

function scoreShoe(s){
  var sc=0;
  if(s.grade.indexOf(dState.grade)>=0)sc+=3;
  if(s.activity.indexOf(dState.activity)>=0)sc+=3;
  if(s.priority.indexOf(dState.priority)>=0)sc+=3;
  if(dState.width&&dState.width!=="idk"){
    if(s.width.indexOf(dState.width)>=0)sc+=3;
    else sc-=2;
  }
  var b=parseInt(dState.budget);
  if(s.budget.indexOf(b)>=0)sc+=3;
  if(b===4&&s.budget.indexOf(3)>=0)sc+=2;
  if(s.usage.indexOf(dState.usage)>=0)sc+=2;
  return sc;
}

      var recStr=rec.toFixed(1)+"cm";
      var isRec=(szWidth==="wide"&&b.diff>0);

    h+='購入前は必ず両足を実測し、左右差がある場合は<strong>大きい方の足</strong>に合わせてください。';
    h+='</div></div>';

    var matching=SHOES.filter(function(s){return foot>=s.sizeCm[0]&&foot<=s.sizeCm[1];})
      .sort(function(a,b){return(b.reviews*b.rating)-(a.reviews*a.rating);})
      .slice(0,3);
    if(matching.length>0){
      h+='<div class="bsh-sec-label sub">👟 このサイズで人気のバッシュ TOP3</div>';
      h+='<div style="font-size:11px;color:#64748b;margin-bottom:12px">お子さんの足サイズに合うモデルをレビュー数の多い順で表示しています</div>';
      matching.forEach(function(s,i){h+=popularShoeCard(s,i);});
      h+='<a class="bsh-article-cta" href="ARTICLE_KIDS_SIZE_GUIDE">';
      h+='<div class="bsh-article-cta-label">サイズ選びをもっと詳しく</div>';
      h+='<div class="bsh-article-cta-text">📘 子どものバッシュサイズ完全ガイド</div>';
      h+='<div class="bsh-article-cta-arrow">ブランド別の特徴・試着チェックポイントも →</div>';
      h+='</a>';
    }
  }
  h+='<div class="bsh-note" style="margin-top:14px">※ 同じブランドでもモデルによってサイズ感は異なります。できれば実際にお店で試着することをおすすめします。</div>';
  resultsEl.innerHTML=h;
}

render();
})();
